<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Estudio IA 🚀</title>
    <style>
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px; 
        }
        h2 { text-align: center; color: #333; }
        form { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: bold; color: #555; }
        input[type="text"], input[type="url"], input[type="email"] { 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-size: 14px; 
        }
        
        /* Estilos nuevos para la botonera de opciones */
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .checkbox-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #333;
        }
        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        button { 
            background-color: #28a745; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 5px; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #218838; }
        #statusMessage { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Asistente de Estudio 🚀</h2>
        
        <form id="studyForm">
            <label for="topic">Tema principal:</label>
            <input type="text" id="topic" name="topic" required placeholder="Ej: Análisis Léxico y ungetc">

            <label for="pdfUrl">URL del Apunte (PDF):</label>
            <input type="url" id="pdfUrl" name="pdfUrl" required placeholder="https://link-a-tu-pdf.com/apunte.pdf">

            <label for="email">Tu Email (Para autorizar - HITL):</label>
            <input type="email" id="email" name="email" required placeholder="tu@email.com">

            <!-- Nueva sección de opciones -->
            <label>¿Qué querés hacer con el apunte?</label>
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="chkResumir" checked> 
                    Armar Resumen
                </label>
                <label>
                    <input type="checkbox" id="chkTraducir"> 
                    Traducir al español
                </label>
                <label>
                    <input type="checkbox" id="chkActividades"> 
                    Generar Actividades
                </label>
            </div>

            <button type="submit" id="submitBtn">Procesar Apunte</button>
        </form>

        <p id="statusMessage"></p>
    </div>

    <script>
        
        document.getElementById('studyForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const statusText = document.getElementById('statusMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            statusText.innerText = 'Enviando datos a n8n... ⏳';
            statusText.style.color = '#007bff';
            submitBtn.disabled = true;

            // 1. Armamos el payload incluyendo el estado de los checkboxes
            const payload = {
                topic: document.getElementById('topic').value,
                pdfUrl: document.getElementById('pdfUrl').value,
                email: document.getElementById('email').value,
                opciones: {
                    resumir: document.getElementById('chkResumir').checked,
                    traducir: document.getElementById('chkTraducir').checked,
                    actividades: document.getElementById('chkActividades').checked
                }
            };

            //  URL DE N8N
            const webhookUrl = 'https://teamcubation.app.n8n.cloud/webhook/81e1bb21-8b77-457b-b035-1202919bb97c'; 

            try {
                
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusText.innerText = '¡Éxito! El agente de IA ya está procesando el apunte. ✅';
                    statusText.style.color = '#28a745';
                    document.getElementById('studyForm').reset();
                } else {
                    statusText.innerText = 'Mmm, hubo un error al enviar el webhook. ❌';
                    statusText.style.color = '#dc3545';
                }
            } catch (error) {
                console.error('Error de red:', error);
                statusText.innerText = 'Error de conexión. ¿Está corriendo el workflow? 🔌';
                statusText.style.color = '#dc3545';
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
